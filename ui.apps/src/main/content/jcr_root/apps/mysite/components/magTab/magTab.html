<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html" />
<sly data-sly-use.model="com.mysite.core.models.MagTabModel" />

<div class="mag-tab" data-component="magtab" data-cards="${model.cardsJson}" data-component-id="${model.componentId}">

  <sly data-sly-test="${model.title}">
    <h2 class="mag-tab-title">${model.title}</h2>
  </sly>

  <sly data-sly-test="${model.tabs && model.tabs.size > 0}">
    <div class="mag-tab-nav-wrapper">
      <div class="mag-tab-nav">
        <sly data-sly-list.tab="${model.tabs}">
          <button 
            class="mag-tab-button ${tabList.first ? 'mag-tab-active' : ''}" 
            data-category="${tab.category}"
            data-index="${tabList.index}"
          >
            ${tab.label}
          </button>
        </sly>
      </div>
    </div>

    <sly data-sly-test="${model.cards && model.cards.size > 0}">
      <div class="mag-tab-content">
        <sly data-sly-list.tab="${model.tabs}">
          <div class="mag-tab-panel ${tabList.first ? 'mag-tab-panel-active' : ''}" data-category="${tab.category}">
            <div class="mag-tab-grid">
            </div>
          </div>
        </sly>
      </div>
    </sly>
  </sly>

  <sly data-sly-call="${templates.placeholder @ isEmpty = !model.tabs || model.tabs.size == 0, cq:emptyText = 'Mag Tab', classAppend='mag-tab'}" />

</div>
