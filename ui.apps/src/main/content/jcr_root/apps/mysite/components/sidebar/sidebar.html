<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html" />
<sly data-sly-use.model="com.mysite.core.models.SidebarModel" />

<div class="sidebar-layout"
     data-state="${model.defaultOpen ? 'expanded' : 'collapsed'}"
     data-collapsible="${model.collapsible}"
     data-variant="${model.variant}">

    <div class="sidebar-layout__overlay"></div>

    <aside class="sidebar">
        <div class="sidebar__header"></div>

        <div class="sidebar__content">
            <sly data-sly-test="${model.hasMenuItems}">
                <ul class="sidebar__menu">
                    <sly data-sly-list.item="${model.menuItems}">
                        <li class="sidebar__menu-item">
                            <a href="${item.url}"
                               class="sidebar__menu-button${item.active ? ' sidebar__menu-button--active' : ''}">
                                <span class="sidebar__menu-label">${item.label}</span>
                            </a>
                        </li>
                    </sly>
                </ul>
            </sly>
        </div>

        <div class="sidebar__footer"></div>

        <button class="sidebar__rail" type="button" aria-label="Toggle sidebar"></button>
    </aside>

    <main class="sidebar-main">
        <div class="sidebar-main__header">
            <button class="sidebar-trigger" type="button" aria-label="Toggle sidebar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2"/>
                    <path d="M9 3v18"/>
                </svg>
            </button>
        </div>
        <div class="sidebar-main__content"></div>
    </main>
</div>

<sly data-sly-call="${templates.placeholder @
    isEmpty = !model.hasMenuItems,
    cq:emptyText = 'Sidebar — Add menu items in the dialog',
    classAppend = 'sidebar-layout'}" />
