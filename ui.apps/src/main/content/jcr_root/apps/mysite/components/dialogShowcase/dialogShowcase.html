<div
  class="dialog-showcase"
  data-sly-use.templates="core/wcm/components/commons/v1/templates.html"
>
  <!-- Component Title -->
  <div class="showcase-header">
    <h2>Dialog Showcase Component</h2>
    <p class="showcase-description">
      This component demonstrates all AEM dialog field types and their values.
    </p>
  </div>

  <!-- TEXT FIELDS SECTION -->
  <section class="showcase-section">
    <h3 class="section-title">Text Fields</h3>

    <div class="field-display">
      <label>Text Field:</label>
      <div class="field-value">${properties.textfield}</div>
    </div>

    <div class="field-display">
      <label>Text Area:</label>
      <div class="field-value field-value--textarea">
        ${properties.textarea}
      </div>
    </div>

    <div class="field-display">
      <label>Number Field:</label>
      <div class="field-value">${properties.numberfield}</div>
    </div>

    <div class="field-display">
      <label>Path Field:</label>
      <div class="field-value">${properties.pathfield}</div>
    </div>

    <div class="field-display">
      <label>Path Browser:</label>
      <div class="field-value">${properties.pathbrowser}</div>
    </div>
  </section>
</div>
