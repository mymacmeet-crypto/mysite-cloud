<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html" />

<header class="mag-header" data-component="magheader">
  <sly data-sly-use.model="com.mysite.core.models.MagHeaderModel"></sly>

  <!-- Top Utility Bar -->
  <div class="mag-header-top">
    <div class="mag-header-container">
      <!-- Left: Social + Subscribe -->
      <div class="mag-header-left">
        <sly data-sly-test="${model.twitterUrl}">
          <a
            href="${model.twitterUrl}"
            class="mag-social-link"
            aria-label="Twitter"
            target="_blank"
            rel="noopener"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"
              />
            </svg>
          </a>
        </sly>
        <sly data-sly-test="${model.facebookUrl}">
          <a
            href="${model.facebookUrl}"
            class="mag-social-link"
            aria-label="Facebook"
            target="_blank"
            rel="noopener"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"
              />
            </svg>
          </a>
        </sly>
        <sly data-sly-test="${model.youtubeUrl}">
          <a
            href="${model.youtubeUrl}"
            class="mag-social-link"
            aria-label="YouTube"
            target="_blank"
            rel="noopener"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M22.54 6.42a2.78 2.78 0 00-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 00-1.94 2A29 29 0 001 11.75a29 29 0 00.46 5.33A2.78 2.78 0 003.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 001.94-2 29 29 0 00.46-5.25 29 29 0 00-.46-5.33z"
              />
              <polygon
                fill="#fff"
                points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"
              />
            </svg>
          </a>
        </sly>
        <sly data-sly-test="${model.subscribeUrl}">
          <a href="${model.subscribeUrl}" class="mag-subscribe-btn"
            >SUBSCRIBE</a
          >
        </sly>
      </div>

      <!-- Center: Logo -->
      <div class="mag-header-center">
        <sly data-sly-test="${model.logoUrl}">
          <a href="${model.logoLink}" class="mag-logo-link">
            <img
              src="${model.logoUrl}"
              alt="${model.logoAlt}"
              class="mag-logo"
            />
          </a>
        </sly>
      </div>

      <!-- Right: Weather + AA -->
      <div class="mag-header-right">
        <sly data-sly-test="${model.weatherText}">
          <div class="mag-weather">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z" />
            </svg>
            <span>${model.weatherText}</span>
          </div>
        </sly>
        <sly data-sly-test="${model.aaButtonUrl}">
          <a
            href="${model.aaButtonUrl}"
            class="mag-aa-btn"
            aria-label="Accessibility"
          >
            <span class="mag-aa-text">Aa</span>
          </a>
        </sly>
      </div>
    </div>
  </div>

  <!-- Main Navigation Bar -->
  <nav class="mag-header-nav">
    <div class="mag-header-container">
      <!-- Mobile Menu Toggle -->
      <button
        class="mag-mobile-toggle"
        aria-label="Toggle menu"
        aria-expanded="false"
      >
        <span class="mag-hamburger"></span>
      </button>

      <!-- Logo (Mobile Only) -->
      <sly data-sly-test="${model.logoUrl}">
        <a href="${model.logoLink}" class="mag-logo-mobile">
          <img src="${model.logoUrl}" alt="${model.logoAlt}" />
        </a>
      </sly>

      <!-- Navigation Items -->
      <ul class="mag-nav-list">
        <sly data-sly-list.navItem="${model.navItems}">
          <li
            class="mag-nav-item ${navItem.submenu && navItem.submenu.size > 0 ? 'mag-has-dropdown' : ''}"
          >
            <a href="${navItem.link}" class="mag-nav-link">${navItem.label}</a>
            <sly data-sly-test="${navItem.submenu && navItem.submenu.size > 0}">
              <ul class="mag-dropdown">
                <sly data-sly-list.subItem="${navItem.submenu}">
                  <li class="mag-dropdown-item">
                    <a href="${subItem.link}" class="mag-dropdown-link"
                      >${subItem.label}</a
                    >
                  </li>
                </sly>
              </ul>
            </sly>
          </li>
        </sly>
      </ul>

      <!-- Search -->
      <div class="mag-search">
        <form class="mag-search-form" action="/search" method="GET">
          <input
            type="search"
            name="q"
            class="mag-search-input"
            placeholder="Search..."
            aria-label="Search"
          />
          <button
            type="submit"
            class="mag-search-btn"
            aria-label="Submit search"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
          </button>
        </form>
      </div>
    </div>
  </nav>

  <!-- Mobile Menu Overlay -->
  <div class="mag-mobile-menu">
    <div class="mag-mobile-menu-header">
      <sly data-sly-test="${model.logoUrl}">
        <img
          src="${model.logoUrl}"
          alt="${model.logoAlt}"
          class="mag-mobile-logo"
        />
      </sly>
      <button class="mag-mobile-close" aria-label="Close menu">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <ul class="mag-mobile-nav">
      <sly data-sly-list.navItem="${model.navItems}">
        <li
          class="mag-mobile-nav-item ${navItem.submenu && navItem.submenu.size > 0 ? 'mag-has-submenu' : ''}"
        >
          <a href="${navItem.link}" class="mag-mobile-nav-link"
            >${navItem.label}</a
          >
          <sly data-sly-test="${navItem.submenu && navItem.submenu.size > 0}">
            <button class="mag-submenu-toggle" aria-label="Toggle submenu">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </button>
            <ul class="mag-mobile-submenu">
              <sly data-sly-list.subItem="${navItem.submenu}">
                <li class="mag-mobile-submenu-item">
                  <a href="${subItem.link}" class="mag-mobile-submenu-link"
                    >${subItem.label}</a
                  >
                </li>
              </sly>
            </ul>
          </sly>
        </li>
      </sly>
    </ul>

    <!-- Mobile Search -->
    <div class="mag-mobile-search">
      <form class="mag-search-form" action="/search" method="GET">
        <input
          type="search"
          name="q"
          class="mag-search-input"
          placeholder="Search..."
          aria-label="Search"
        />
        <button type="submit" class="mag-search-btn" aria-label="Submit search">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
      </form>
    </div>
  </div>

  <sly
    data-sly-call="${templates.placeholder @
        isEmpty = !model.logoUrl,
        cq:emptyText = 'Mag Header',
        classAppend='mag-header'}"
  />
</header>
