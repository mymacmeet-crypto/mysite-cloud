<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html" />
<sly data-sly-use.model="com.mysite.core.models.MagHeaderModel" />

<header class="mag-header" data-component="magheader">

  <!-- Top Utility Bar -->
  <div class="mag-header-top">
    <div class="mag-header-container">

      <!-- Left: Social + Subscribe -->
      <div class="mag-header-left">

        <sly data-sly-test="${model.twitterUrl}">
          <a href="${model.twitterUrl @ context='uri'}"
             class="mag-social-link"
             aria-label="Twitter"
             target="_blank"
             rel="noopener noreferrer">
            <svg width="18" height="18"
                 viewBox="0 0 24 24"
                 fill="currentColor"
                 xmlns="http://www.w3.org/2000/svg">
              <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/>
            </svg>
          </a>
        </sly>

        <sly data-sly-test="${model.facebookUrl}">
          <a href="${model.facebookUrl @ context='uri'}"
             class="mag-social-link"
             aria-label="Facebook"
             target="_blank"
             rel="noopener noreferrer">
            <svg width="18" height="18"
                 viewBox="0 0 24 24"
                 fill="currentColor"
                 xmlns="http://www.w3.org/2000/svg">
              <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
            </svg>
          </a>
        </sly>

        <sly data-sly-test="${model.youtubeUrl}">
          <a href="${model.youtubeUrl @ context='uri'}"
             class="mag-social-link"
             aria-label="YouTube"
             target="_blank"
             rel="noopener noreferrer">
            <svg width="18" height="18"
                 viewBox="0 0 24 24"
                 fill="currentColor"
                 xmlns="http://www.w3.org/2000/svg">
              <path d="M22.54 6.42a2.78 2.78 0 00-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 00-1.94 2A29 29 0 001 11.75a29 29 0 00.46 5.33A2.78 2.78 0 003.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 001.94-2 29 29 0 00.46-5.25 29 29 0 00-.46-5.33z"/>
              <polygon fill="#fff" points="9.75 15.02 15.5 11.75 9.75 8.48"/>
            </svg>
          </a>
        </sly>

        <sly data-sly-test="${model.subscribeUrl}">
          <a href="${model.subscribeUrl @ context='uri'}"
             class="mag-subscribe-btn">
             SUBSCRIBE
          </a>
        </sly>

      </div>

      <!-- Center: Logo -->
      <div class="mag-header-center">
        <sly data-sly-test="${model.logoUrl}">
          <a href="${model.logoLink @ context='uri'}"
             class="mag-logo-link">
            <img src="${model.logoUrl @ context='uri'}"
                 alt="${model.logoAlt @ context='html'}"
                 class="mag-logo" />
          </a>
        </sly>
      </div>

      <!-- Right: Weather + AA -->
      <div class="mag-header-right">

        <sly data-sly-test="${model.weatherText}">
          <div class="mag-weather">
            <svg width="20" height="20"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 xmlns="http://www.w3.org/2000/svg">
              <path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/>
            </svg>
            <span>${model.weatherText @ context='html'}</span>
          </div>
        </sly>

        <sly data-sly-test="${model.aaButtonUrl}">
          <a href="${model.aaButtonUrl @ context='uri'}"
             class="mag-aa-btn"
             aria-label="Accessibility">
             <span class="mag-aa-text">Aa</span>
          </a>
        </sly>

      </div>

    </div>
  </div>

  <!-- Keep your remaining navigation code same, just add @context='uri' to every href -->

  <sly
    data-sly-call="${templates.placeholder @
      isEmpty = !model.logoUrl,
      cq:emptyText = 'Mag Header',
      classAppend='mag-header'}"
  />

</header>
