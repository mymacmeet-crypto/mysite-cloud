<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html" />
<sly data-sly-use.model="com.mysite.core.models.MagCopyrightBarModel" />

<footer class="mag-copyright-bar" data-component="magcopyrightbar">

  <div class="mag-copyright-bar-container">

    <!-- Left: Copyright -->
    <div class="mag-copyright-bar-left">
      <sly data-sly-test="${model.copyrightText}">
        <p class="mag-copyright-bar-text">
          ${model.copyrightText @ context='html'}
        </p>
      </sly>
    </div>

    <!-- Center: Links -->
    <div class="mag-copyright-bar-center">
      <sly data-sly-list.link="${model.footerLinks}">
        <a href="${link.link @ context='uri'}"
           class="mag-copyright-bar-link">
           
          <svg class="mag-copyright-bar-link-arrow"
               width="8"
               height="8"
               viewBox="0 0 24 24"
               fill="currentColor"
               xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5v14l11-7z"/>
          </svg>

          ${link.label}
        </a>
      </sly>
    </div>

    <!-- Right: Social Icons -->
    <div class="mag-copyright-bar-right">

      <!-- Twitter -->
      <sly data-sly-test="${model.twitterUrl}">
        <a href="${model.twitterUrl @ context='uri'}"
           class="mag-copyright-bar-social"
           aria-label="Twitter"
           target="_blank"
           rel="noopener noreferrer">

          <svg width="18"
               height="18"
               viewBox="0 0 24 24"
               fill="currentColor"
               xmlns="http://www.w3.org/2000/svg">
            <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/>
          </svg>

        </a>
      </sly>

      <!-- Facebook -->
      <sly data-sly-test="${model.facebookUrl}">
        <a href="${model.facebookUrl @ context='uri'}"
           class="mag-copyright-bar-social"
           aria-label="Facebook"
           target="_blank"
           rel="noopener noreferrer">

          <svg width="18"
               height="18"
               viewBox="0 0 24 24"
               fill="currentColor"
               xmlns="http://www.w3.org/2000/svg">
            <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
          </svg>
        </a>
      </sly>
    </div>

  </div>
</footer>
