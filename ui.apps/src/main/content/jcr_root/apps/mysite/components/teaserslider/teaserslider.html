<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html" />

<div
  class="ts-customcardlist"
  data-component="teaserslider"
  data-autoplay="${properties.autoplay}"
  data-delay="${properties.delay}"
>
  <sly
    data-sly-use.model="com.mysite.core.models.TeaserSliderModel"
    data-sly-test.hasItems="${model.customCardList && model.customCardList.size > 0}"
  ></sly>

  <div class="ts-header">
    <h2 class="ts-section-title">${properties.sectionTitle}</h2>
    <div class="ts-controls">
      <button class="ts-control-btn ts-prev" aria-label="Previous">
        <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
          <path
            d="M9 1L1 8L9 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <button class="ts-control-btn ts-next" aria-label="Next">
        <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
          <path
            d="M1 1L9 8L1 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  </div>

  <div class="ts-track-wrapper">
    <div class="ts-track">
      <sly data-sly-list.item="${model.customCardList}">
        <div class="ts-card">
          <div class="ts-card-image">
            <div class="ts-image-wrapper">
              <sly data-sly-test="${item.fileReference}">
                <img
                  src="${item.fileReference}"
                  alt="${item.title}"
                  style="width: 100%; height: auto"
                />
              </sly>
            </div>
          </div>
          <div class="ts-card-body">
            <h3 class="ts-typography-h3">${item.title}</h3>
            <div class="ts-typography-p">${item.text @ context='html'}</div>
          </div>
        </div>
      </sly>
    </div>
  </div>

  <sly
    data-sly-call="${templates.placeholder @
        isEmpty = !hasItems,
        cq:emptyText = 'Teaser Slider',
        classAppend='teaser-slider'}"
  />
</div>
